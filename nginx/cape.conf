server {
    listen 80;
    server_name _;

    # Redirect to HTTPS (optional, uncomment if you have a certificate)
    # return 301 https://$host$request_uri;

    client_max_body_size 256m;
    client_body_timeout 300s;

    # Proxy to the CAPE web interface
    location / {
        proxy_pass http://cape-web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Serve static files directly (if shared volume is mounted)
    # location /static/ {
    #     alias /opt/CAPEv2/web/static/;
    #     expires 30d;
    # }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

